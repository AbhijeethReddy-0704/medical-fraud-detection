version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: fraud_db
    environment:
      POSTGRES_USER: frauduser
      POSTGRES_PASSWORD: fraudpass
      POSTGRES_DB: medicare_fraud
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U frauduser -d medicare_fraud"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: fraud_api
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_USER=frauduser
      - POSTGRES_PASSWORD=fraudpass
      - POSTGRES_DB=medicare_fraud
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./src:/app/src

  dashboard:
    build:
      context: .
      dockerfile: docker/Dockerfile.dashboard
    container_name: fraud_dashboard
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api:8000
    depends_on:
      - api
    volumes:
      - ./src:/app/src

volumes:
  postgres_data:
